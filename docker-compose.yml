services:
  redis:
    image: redis:7-alpine
    container_name: officeping-redis
    tmpfs:
      - /data
    command: redis-server --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:15-alpine
    container_name: officeping-db
    environment:
      POSTGRES_USER: ${DB_USER:-officeping}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-officeping}
      POSTGRES_DB: ${DB_NAME:-officeping}
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-officeping}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: officeping-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-officeping}:${DB_PASSWORD:-officeping}@postgres:5432/${DB_NAME:-officeping}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-questionpro.com}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      REDIS_URL: redis://redis:6379
      DEMO_MODE: ${DEMO_MODE:-true}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@officeping.local}
      API_BASE_URL: ${API_BASE_URL:-https://localhost}
      WEB_ORIGIN: ${WEB_ORIGIN:-https://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ""
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
        VITE_DEMO_MODE: ${DEMO_MODE:-true}
    container_name: officeping-web
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
    container_name: officeping-gateway
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - web
